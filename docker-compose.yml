services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api_gateway/Dockerfile
    container_name: collaborative-video-api-gateway
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
    command: uvicorn apps.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7
    container_name: collaborative-video-redis
    ports:
      - "6379:6379"